# RMPFlow Config — Mecademic Meca500 R3
# rmp_params are standard defaults (same as Cobotta/Franka examples from Isaac Sim).
# body_cylinders approximate the static robot base for self-collision avoidance.

# Buffer (rad) applied inside each joint limit so RMPFlow never commands the hard stop.
joint_limit_buffers: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]

rmp_params:
    cspace_target_rmp:
        metric_scalar: 50.
        position_gain: 100.
        damping_gain: 50.
        robust_position_term_thresh: .5
        inertia: 1.
    cspace_trajectory_rmp:
        p_gain: 100.
        d_gain: 10.
        ff_gain: .25
        weight: 50.
    cspace_affine_rmp:
        final_handover_time_std_dev: .25
        weight: 2000.
    joint_limit_rmp:
        metric_scalar: 1000.
        metric_length_scale: .01
        metric_exploder_eps: 1e-3
        metric_velocity_gate_length_scale: .01
        accel_damper_gain: 200.
        accel_potential_gain: 1.
        accel_potential_exploder_length_scale: .1
        accel_potential_exploder_eps: 1e-2
    joint_velocity_cap_rmp:
        max_velocity: 1.0
        velocity_damping_region: .3
        damping_gain: 1000.0
        metric_weight: 100.
    target_rmp:
        accel_p_gain: 30.
        accel_d_gain: 85.
        accel_norm_eps: .075
        metric_alpha_length_scale: .05
        min_metric_alpha: .01
        max_metric_scalar: 10000
        min_metric_scalar: 2500
        proximity_metric_boost_scalar: 20.
        proximity_metric_boost_length_scale: .02
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    axis_target_rmp:
        accel_p_gain: 210.
        accel_d_gain: 60.
        metric_scalar: 10
        proximity_metric_boost_scalar: 3000.
        proximity_metric_boost_length_scale: .08
        xi_estimator_gate_std_dev: 20000.
        accept_user_weights: false
    collision_rmp:
        damping_gain: 50.
        damping_std_dev: .04
        damping_robustness_eps: 1e-2
        damping_velocity_gate_length_scale: .01
        repulsion_gain: 800.
        repulsion_std_dev: .01
        metric_modulation_radius: .5
        metric_scalar: 10000.
        metric_exploder_std_dev: .02
        metric_exploder_eps: .001
    damping_rmp:
        accel_d_gain: 30.
        metric_scalar: 50.
        inertia: 100.

canonical_resolve:
    max_acceleration_norm: 50.
    projection_tolerance: .01
    verbose: false

# Static capsules approximating the robot base column (world-frame absolute coords).
# Prevents the distal links from colliding with the base during large motions.
body_cylinders:
    - name: base_column
      pt1: [0.0, 0.0, 0.091]
      pt2: [0.0, 0.0, 0.0]
      radius: 0.045
    - name: base_plate
      pt1: [0.0, 0.0, 0.0]
      pt2: [0.0, 0.0, 0.0]
      radius: 0.075

# Moving spheres (at URDF link frames) that must not penetrate body_cylinders.
body_collision_controllers:
    - name: meca_axis_5_link
      radius: 0.025
    - name: meca_axis_6_link
      radius: 0.020

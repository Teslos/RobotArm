# LULA robot descriptor for mechArm 270-Pi ("firefighter" URDF)
# Used by RMPFlow to understand the kinematic chain.
api_version: 1.0

# Default joint configuration (home pose — all joints at zero)
cspace:
    - joint_name: joint1_to_base
      default_q: 0.00

    - joint_name: joint2_to_joint1
      default_q: 0.00

    - joint_name: joint3_to_joint2
      default_q: 0.00

    - joint_name: joint4_to_joint3
      default_q: 0.00

    - joint_name: joint5_to_joint4
      default_q: 0.00

    - joint_name: joint6_to_joint5
      default_q: 0.00

# The tool frame is the last link
tool_center_point:
    - offset: [0, 0, 0.03]
      frame: link6

# All 6 joints are controlled directly
cspace_to_urdf_rules:
    - rule: pass_through
      name: joint1_to_base

    - rule: pass_through
      name: joint2_to_joint1

    - rule: pass_through
      name: joint3_to_joint2

    - rule: pass_through
      name: joint4_to_joint3

    - rule: pass_through
      name: joint5_to_joint4

    - rule: pass_through
      name: joint6_to_joint5
